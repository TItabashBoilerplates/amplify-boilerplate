# Mobile Authentication Flow - Cognito Email OTP Login (Template)
# Tests the passwordless Email OTP authentication flow for the Expo mobile app.
#
# Auth stack: Amazon Cognito (Amplify Auth, passwordless Email OTP).
# Client: aws-amplify/auth — signIn (USER_AUTH + EMAIL_OTP) → confirmSignIn.
#
# NOTE: This is a template. Update when mobile auth screens are implemented.
# Required implementations:
#   - Login screen with email input
#   - OTP verification screen
#
# OTP delivery: Cognito sends the code via Amazon SES. There is no local mail
# sink, so the OTP step needs a test mailbox (see web/auth/login-flow.yaml and
# scripts/get-otp-from-email.js) before it can be fully automated.

appId: ${APP_ID}
name: "Mobile Cognito Email OTP Login Flow"
tags:
  - auth
  - mobile
  - e2e
  - wip # Mark as work-in-progress until auth screens are ready

env:
  TEST_EMAIL: "testuser@example.com"

---
# Step 1: Launch app and clear state
- launchApp:
    clearState: true
    permissions:
      all: allow

# Step 2: Navigate to login screen (update selector when implemented)
# - tapOn: "Login"

# Step 3: Enter email address (update selector when implemented)
# - tapOn:
#     id: "email-input"
# - inputText: ${TEST_EMAIL}

# Step 4: Submit OTP request (Cognito signIn USER_AUTH + EMAIL_OTP)
# - tapOn: "Send OTP"

# Step 5: Fetch the Cognito OTP code from the test mailbox
#   NOTE: Implement scripts/get-otp-from-email.js against your mailbox provider.
# - runScript:
#     file: ../../scripts/get-otp-from-email.js
#     env:
#       TEST_EMAIL: ${TEST_EMAIL}
#       WAIT_FOR_EMAIL: "true"
#       MAX_RETRIES: "15"

# Step 6: Enter OTP code (update selector when implemented)
# - tapOn:
#     id: "otp-input"
# - inputText: ${output.otpCode}

# Step 7: Submit verification (Cognito confirmSignIn)
# - tapOn: "Verify"

