name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend (lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Biome (lint + format check)
        run: pnpm run lint:ci
      # amplify_outputs.json は生成物（gitignore）。CI では AWS にデプロイせず型チェック/ビルドを
      # 通すため、公開情報のみのスタブ（apps/web/amplify_outputs.ci.json, シークレットなし）を
      # 配置する。実環境の出力は Amplify Hosting が backend デプロイ後に生成する（amplify.yml）。
      - name: Stub amplify_outputs.json (no secrets; type-check/build only)
        run: cp apps/web/amplify_outputs.ci.json apps/web/amplify_outputs.json
      - name: Type check (tsc)
        run: pnpm run type-check
      - name: Build (next build)
        run: pnpm run --filter @workspace/web build

  backend-py:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen
      - name: Ruff lint
        run: uv run ruff check apps packages
      - name: Ruff format check
        run: uv run ruff format --check apps packages
      - name: MyPy
        run: uv run mypy apps packages
      - name: Pytest
        run: uv run pytest
