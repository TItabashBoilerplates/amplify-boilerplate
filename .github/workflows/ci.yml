name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend (lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome (lint + format check)
        run: bun run lint:ci
      # amplify_outputs.json は生成物（gitignore）。CI では AWS にデプロイせず型チェック/ビルドを
      # 通すため、公開情報のみのスタブ（apps/web/amplify_outputs.ci.json, シークレットなし）を
      # 配置する。実環境の出力は Amplify Hosting が backend デプロイ後に生成する（amplify.yml）。
      - name: Stub amplify_outputs.json (no secrets; type-check/build only)
        run: cp apps/web/amplify_outputs.ci.json apps/web/amplify_outputs.json
      - name: Type check (tsc)
        run: bun run type-check
      - name: Build (next build)
        run: bun run --filter @workspace/web build

  backend-py:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen
      - name: Ruff lint
        run: uv run ruff check apps packages
      - name: Ruff format check
        run: uv run ruff format --check apps packages
      - name: MyPy
        run: uv run mypy apps packages
      - name: Pytest
        run: uv run pytest
