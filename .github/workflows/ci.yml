name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend (lint + format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome (lint + format check)
        run: bun run lint:ci
      # 注: web の type-check / build は amplify_outputs.json（生成物）に依存するため
      # CI では実行しない。Amplify Hosting のビルド（amplify.yml）が backend デプロイ後に
      # 出力を生成してから Next.js をビルドする。

  backend-py:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-py
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen
      - name: Ruff lint
        run: uv run ruff check apps packages
      - name: Ruff format check
        run: uv run ruff format --check apps packages
      - name: MyPy
        run: uv run mypy apps packages
      - name: Pytest
        run: uv run pytest
