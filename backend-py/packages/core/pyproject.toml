[project]
name = "core"
version = "0.1.0"
description = "Shared infrastructure for backend-py services (logging, exceptions)"
requires-python = ">=3.13"
dependencies = [
    "structlog",
    "orjson >=3.10.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/core"]
