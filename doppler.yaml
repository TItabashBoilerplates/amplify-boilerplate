# Doppler セットアップ定義（テンプレート）
#
# `doppler setup`（対話）または `doppler setup --no-interactive`（CI/自動）が
# このファイルを読み、ローカルディレクトリを Doppler の project / config に紐付ける。
# 詳細・移行方針・ベストプラクティスは .claude/skills/doppler/SKILL.md を参照。
#
# このファイルはコミット対象（機密は含まない）。実プロジェクト名に置換して使う雛形で、
# project 名の <...> は要編集。
#
# 何を Doppler に置くか（重要）:
#   - シークレット（API キー等。旧 env/.env.secrets の中身）→ Doppler 管理（ここ）
#   - 非機密の環境変数（ローカル Supabase URL / backend URL / port 等。env/*/.env.local）
#     → ファイル管理のまま（Doppler に載せない）
#
# config（環境）の構成 — Doppler 公式の既定に準拠:
#   dev / stg / prd の 3 つの root config。各 root が環境ごとの secrets マスター。
#   ローカル開発は dev を継承した **personal config（dev_personal）** を使うのが公式推奨
#   （開発者ごとに専用ブランチ・他人からは不可視・dev の更新を自動継承）。
#
# 参照する config は環境変数 ENV で切り替わる（devenv profile が対応する ENV を export。
# deploy スクリプト scripts/supabase/*.sh と同じ ENV 規約）。SKILL.md / devenv.nix と一致させること:
#   ENV=local（既定） → このファイルのローカル紐付け config（dev_personal。`doppler setup` で選択）
#   ENV=dev           → dev   （devenv up -P dev）
#   ENV=staging       → stg   （-P staging）
#   ENV=production    → prd   （-P production）
#
# モノレポで service ごとに別 project に分けたい場合は `path:` 付きで複数エントリを列挙:
#   setup:
#     - project: <project>-backend
#       config: dev_personal
#       path: backend-py
#     - project: <project>-frontend
#       config: dev_personal
#       path: frontend
#
# まずは単一 project + personal config で開始する（下記）。

setup:
  - project: <doppler-project> # TODO: 実プロジェクト名に置換（doppler setup で確定）
    config: dev_personal # ローカルは personal config（dev を継承・開発者専用）
